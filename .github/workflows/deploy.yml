name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ae16632f626317c4c3dc2a7174bc542d
      NEXT_PUBLIC_SUPABASE_URL: https://ejypnkyztcfvkkdkhuds.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeXBua3l6dGNmdmtrZGtodWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDY3MjAsImV4cCI6MjA4ODMyMjcyMH0.9xO7g17aePJUNyjUoYOJ4dOTQp3F9CI7NHEP2FFObfo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx opennextjs-cloudflare build

      - name: Deploy
        run: npx wrangler deploy

      - name: Notify IndexNow
        run: |
          echo "Waiting for deployment to propagate..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://juiceme.app/4ac67cde0148d7ac49d88af833e4138f.txt)
            echo "Key file status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Key file live, submitting to IndexNow..."
              curl -s -X POST https://juiceme.app/api/indexnow \
                -H "Authorization: Bearer ${{ secrets.INDEXNOW_SUBMIT_TOKEN }}" \
                -H "Content-Type: application/json"
              break
            fi
          done
